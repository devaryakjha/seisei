name: seisei_flutter_intents
description: Flutter runtime bridge for Seisei app actions and generated App Intents.
version: 0.1.0-dev.3
repository: https://github.com/devaryakjha/seisei
issue_tracker: https://github.com/devaryakjha/seisei/issues
topics:
  - ai
  - flutter
  - intents
  - tool-calling
  - app-actions

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.3.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  seisei_intents: ^0.1.0-dev.9

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SeiseiFlutterIntentsPlugin
      macos:
        pluginClass: SeiseiFlutterIntentsPlugin
