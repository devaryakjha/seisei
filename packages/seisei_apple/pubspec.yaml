name: seisei_apple
description: Apple Foundation Models provider and Flutter bridge for Seisei.
version: 0.1.0-dev.3
repository: https://github.com/devaryakjha/seisei
issue_tracker: https://github.com/devaryakjha/seisei/issues
topics:
  - ai
  - apple
  - dart
  - foundation-models
  - on-device

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.3.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  seisei: ^0.1.0-dev.0
  seisei_schema: ^0.1.0-dev.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.26.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SeiseiApplePlugin
      macos:
        pluginClass: SeiseiApplePlugin
