name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dart:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Validate
        run: dart tool/validate.dart
